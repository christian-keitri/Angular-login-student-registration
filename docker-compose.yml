version: '3.8'

services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: students_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--host=localhost", "--user=root", "--password=rootpassword"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  php_backend:
    image: student-login-php_backend  # Custom PHP image if needed
    volumes:
      - ./php-app:/var/www/html  # Ensure this points to your PHP app directory
    ports:
      - "80:80"
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql  # Ensure your PHP backend knows to look for the 'mysql' service
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
      MYSQL_DB: students_db
    restart: on-failure  # Ensure restart policy in case of failure
  
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
